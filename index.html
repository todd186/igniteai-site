  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

8px 13px !important;font-size:12px !important;}\n  }\n  html, body { margin: 0; padding: 0; }\n  body { background: #fff; font-family: 'Archivo', system-ui, sans-serif; color: #141310; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }\n  a, a:visited { color: #141310; text-decoration: none; }\n  a:hover { color: #000; }\n  ::selection { background: #F5C518; color: #141310; }\n  @keyframes ig-blink { 0%,80%,100%{opacity:.25;} 40%{opacity:1;} }\n  .ig-in::placeholder { color: #9A948A; }\n  .ig-fld::placeholder { color: #8C8B84; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;\">\n\n  <!-- NAV -->\n  <div style=\"position:sticky;top:0;z-index:50;background:rgba(11,10,8,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(245,197,24,.18);\">\n    <div style=\"max-width:1140px;margin:0 auto;padding:0 28px;height:66px;display:flex;align-items:center;justify-content:space-between;gap:20px;\">\n      <a href=\"#top\" style=\"display:flex;align-items:center;gap:10px;\">\n        <span style=\"width:26px;height:26px;background:#F5C518;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#141310;\">AI<\u002Fspan>\n        <span style=\"font-size:14px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#fff;\">Ignite AI<\u002Fspan>\n      <\u002Fa>\n      <div class=\"ig-navlinks\" style=\"display:flex;align-items:center;gap:26px;font-size:13px;font-weight:600;color:#CFC7B0;\">\n        <a href=\"#assistant\" style=\"color:#CFC7B0;\">The Assistant<\u002Fa>\n        <a href=\"#secrets\" style=\"color:#CFC7B0;\">Secrets<\u002Fa>\n        <a href=\"#workshops\" style=\"color:#CFC7B0;\">Workshops<\u002Fa>\n        <a href=\"#resources\" style=\"color:#CFC7B0;\">Resources<\u002Fa>\n        <a href=\"#about\" style=\"color:#CFC7B0;\">About<\u002Fa>\n        <a href=\"{{ amazonUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"border:1.5px solid #F5C518;color:#F5C518;padding:9px 18px;border-radius:999px;font-weight:800;\">Order the Book<\u002Fa>\n        <a href=\"#book\" style=\"background:#F5C518;color:#141310;padding:9px 18px;border-radius:999px;font-weight:800;\">Book a Workshop<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- HERO + ASSISTANT -->\n  <div id=\"top\" style=\"scroll-margin-top:66px;background:#0B0A08;color:#fff;padding:70px 28px 84px;position:relative;overflow:hidden;\">\n    <div style=\"position:absolute;top:-140px;right:-120px;width:420px;height:420px;background:radial-gradient(circle,rgba(245,197,24,.16),transparent 68%);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"max-width:1140px;margin:0 auto;position:relative;\">\n      <div style=\"text-align:center;max-width:760px;margin:0 auto 40px;\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#F5C518;margin-bottom:20px;\">From The AI Pocket Guide<\u002Fdiv>\n        <h1 style=\"font-size:58px;line-height:1.02;font-weight:800;letter-spacing:-.03em;margin:0 0 22px;text-wrap:balance;\">Lead AI. Don't get<br>managed by it.<\u002Fh1>\n        <p style=\"font-size:18px;line-height:1.6;font-weight:300;color:#CFC7B0;margin:0 auto;max-width:600px;text-wrap:pretty;\">Ask the assistant anything a CEO needs to know about leading through the AI shift.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- ASSISTANT CARD -->\n      <div id=\"assistant\" style=\"scroll-margin-top:82px;max-width:820px;margin:0 auto;background:#fff;border-radius:20px;box-shadow:0 30px 70px rgba(0,0,0,.45);overflow:hidden;color:#141310;\">\n        <div style=\"display:flex;align-items:center;gap:11px;padding:16px 22px;border-bottom:1px solid rgba(20,19,16,.10);background:#F8F5EC;\">\n          <span style=\"width:30px;height:30px;background:#141310;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#F5C518;\">AI<\u002Fspan>\n          <div>\n            <div style=\"font-size:14px;font-weight:800;letter-spacing:-.01em;\">Ask the Guide<\u002Fdiv>\n            <div style=\"font-size:11px;color:#8C8B84;font-weight:500;\">Grounded in The AI Pocket Guide + AI research<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasMessages }}\" hint-placeholder-val=\"{{ false }}\">\n            <button onclick=\"{{ onRestart }}\" style=\"margin-left:auto;display:flex;align-items:center;gap:6px;background:none;border:1px solid rgba(20,19,16,.18);color:#5A564C;font-size:12px;font-weight:700;padding:7px 13px;border-radius:999px;cursor:pointer;\" style-hover=\"border-color:#141310;color:#141310;\">↺ Restart<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- messages / empty state -->\n        <div ref=\"{{ setMsgRef }}\" style=\"max-height:360px;min-height:150px;overflow-y:auto;padding:22px;\">\n          <sc-if value=\"{{ hasMessages }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;flex-direction:column;gap:16px;\">\n              <sc-for list=\"{{ msgs }}\" as=\"m\" hint-placeholder-count=\"0\">\n                <div style=\"display:flex;flex-direction:column;\">\n                  <sc-if value=\"{{ m.isUser }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"align-self:flex-end;max-width:80%;background:#141310;color:#fff;padding:11px 15px;border-radius:14px 14px 3px 14px;font-size:14px;line-height:1.5;font-weight:500;\">{{ m.text }}<\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ m.isBot }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"align-self:flex-start;max-width:92%;\">\n                      <div style=\"background:#F4F1E8;color:#141310;padding:14px 16px;border-radius:3px 14px 14px 14px;font-size:14px;line-height:1.6;white-space:pre-wrap;border-left:3px solid #F5C518;\">{{ m.text }}<\u002Fdiv>\n                      <sc-if value=\"{{ m.hasFollowups }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div style=\"margin-top:10px;display:flex;flex-wrap:wrap;gap:8px;\">\n                          <sc-for list=\"{{ m.followups }}\" as=\"fp\" hint-placeholder-count=\"0\">\n                            <button onclick=\"{{ fp.onClick }}\" style=\"cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:#141310;background:#fff;border:1px solid rgba(20,19,16,.18);padding:7px 12px;border-radius:999px;\" style-hover=\"border-color:#F5C518;background:#FCF8E8;\">{{ fp.label }}<\u002Fbutton>\n                          <\u002Fsc-for>\n                        <\u002Fdiv>\n                      <\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"align-self:flex-start;background:#F4F1E8;padding:14px 18px;border-radius:3px 14px 14px 14px;border-left:3px solid #F5C518;display:flex;gap:5px;align-items:center;\">\n                  <span style=\"width:7px;height:7px;border-radius:50%;background:#B98900;animation:ig-blink 1.2s infinite;\"><\u002Fspan>\n                  <span style=\"width:7px;height:7px;border-radius:50%;background:#B98900;animation:ig-blink 1.2s .2s infinite;\"><\u002Fspan>\n                  <span style=\"width:7px;height:7px;border-radius:50%;background:#B98900;animation:ig-blink 1.2s .4s infinite;\"><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n            <div>\n              <div style=\"font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#B98900;margin-bottom:12px;\">Try asking<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:9px;\">\n                <sc-for list=\"{{ starters }}\" as=\"s\" hint-placeholder-count=\"6\">\n                  <button onclick=\"{{ s.onClick }}\" style=\"cursor:pointer;text-align:left;font-family:inherit;font-size:14px;font-weight:500;color:#141310;background:#F8F5EC;border:1px solid rgba(20,19,16,.10);padding:12px 15px;border-radius:11px;display:flex;align-items:center;gap:10px;\" style-hover=\"border-color:#F5C518;background:#FCF8E8;\">\n                    <span style=\"color:#B98900;font-weight:800;\">›<\u002Fspan>{{ s.label }}\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- composer -->\n        <div style=\"padding:14px 16px;border-top:1px solid rgba(20,19,16,.10);background:#F8F5EC;display:flex;gap:10px;align-items:flex-end;\">\n          <textarea class=\"ig-in\" rows=\"1\" value=\"{{ draft }}\" oninput=\"{{ onDraft }}\" onkeydown=\"{{ onKey }}\" placeholder=\"Ask anything about AI — strategy, tools, trends, your team…\" style=\"flex:1;resize:none;font-family:inherit;font-size:14px;line-height:1.5;color:#141310;background:#fff;border:1px solid rgba(20,19,16,.16);border-radius:12px;padding:12px 14px;max-height:120px;outline:none;\"><\u002Ftextarea>\n          <button onclick=\"{{ onSend }}\" style=\"cursor:pointer;flex-shrink:0;font-family:inherit;font-size:14px;font-weight:800;color:#141310;background:#F5C518;border:none;padding:13px 20px;border-radius:12px;\" style-hover=\"background:#ffd21f;\">Ask<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:center;margin-top:20px;font-size:12.5px;color:#8B857A;\">Want a human? <a href=\"#book\" style=\"color:#F5C518;font-weight:700;\">Book a workshop with Todd →<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- SECRETS -->\n  <div id=\"secrets\" style=\"scroll-margin-top:66px;background:#F4F1E8;padding:86px 28px;\">\n    <div style=\"max-width:1140px;margin:0 auto;\">\n      <div style=\"max-width:640px;margin-bottom:44px;\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#B98900;margin-bottom:14px;\">Secrets from the book<\u002Fdiv>\n        <h2 style=\"font-size:40px;line-height:1.06;font-weight:800;letter-spacing:-.02em;margin:0 0 14px;text-wrap:balance;\">What most CEOs are getting wrong about AI<\u002Fh2>\n        <p style=\"font-size:16.5px;line-height:1.6;color:#5B5852;margin:0;text-wrap:pretty;\">Six numbers from The AI Pocket Guide that explain the gap between the companies pulling ahead and the ones falling behind.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;\">\n        <div style=\"background:#fff;border-radius:16px;padding:26px 24px;border:1px solid rgba(20,19,16,.08);\">\n          <div style=\"font-size:46px;font-weight:800;letter-spacing:-.03em;color:#141310;line-height:1;\">85%<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.55;color:#5B5852;margin-top:12px;\">of employees say leadership has <b style=\"color:#141310;\">never communicated a clear AI strategy<\u002Fb>. They're improvising on their own.<\u002Fdiv>\n          <div style=\"font-size:11px;color:#948F82;margin-top:12px;font-style:italic;\">Gallup<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border-radius:16px;padding:26px 24px;border:1px solid rgba(20,19,16,.08);\">\n          <div style=\"font-size:46px;font-weight:800;letter-spacing:-.03em;color:#B98900;line-height:1;\">3×<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.55;color:#5B5852;margin-top:12px;\">more likely to see real profit impact when you <b style=\"color:#141310;\">redesign workflows<\u002Fb> — not just deploy tools.<\u002Fdiv>\n          <div style=\"font-size:11px;color:#948F82;margin-top:12px;font-style:italic;\">McKinsey State of AI<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#141310;border-radius:16px;padding:26px 24px;\">\n          <div style=\"font-size:46px;font-weight:800;letter-spacing:-.03em;color:#F5C518;line-height:1;\">~95%<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.55;color:#E9E4D6;margin-top:12px;\">of corporate AI pilots deliver <b style=\"color:#fff;\">no measurable P&amp;L impact<\u002Fb>. The tool was never the problem.<\u002Fdiv>\n          <div style=\"font-size:11px;color:#948F82;margin-top:12px;font-style:italic;\">MIT, 2025<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border-radius:16px;padding:26px 24px;border:1px solid rgba(20,19,16,.08);\">\n          <div style=\"font-size:46px;font-weight:800;letter-spacing:-.03em;color:#141310;line-height:1;\">5%<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.55;color:#5B5852;margin-top:12px;\">the small share of companies <b style=\"color:#141310;\">actually capturing AI's value<\u002Fb>. There's still room to be one of them.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border-radius:16px;padding:26px 24px;border:1px solid rgba(20,19,16,.08);\">\n          <div style=\"font-size:46px;font-weight:800;letter-spacing:-.03em;color:#141310;line-height:1;\">2–4<span style=\"font-size:22px;font-weight:700;\"> yrs<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.55;color:#5B5852;margin-top:12px;\">the honest AI payback window to give your board — <b style=\"color:#141310;\">don't soften it<\u002Fb>, then show the measurement plan.<\u002Fdiv>\n          <div style=\"font-size:11px;color:#948F82;margin-top:12px;font-style:italic;\">Deloitte<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border-radius:16px;padding:26px 24px;border:1px solid rgba(20,19,16,.08);\">\n          <div style=\"font-size:46px;font-weight:800;letter-spacing:-.03em;color:#B98900;line-height:1;\">1<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.55;color:#5B5852;margin-top:12px;\">name — not a title — is the only acceptable answer when your board asks <b style=\"color:#141310;\">\"who's accountable for AI?\"<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:34px;\">\n        <a href=\"#assistant\" style=\"display:inline-flex;align-items:center;gap:8px;background:#141310;color:#fff;padding:13px 24px;border-radius:999px;font-weight:700;font-size:14px;\">Ask the assistant why <span style=\"color:#F5C518;\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- QUOTES -->\n  <div style=\"background:#0B0A08;color:#fff;padding:80px 28px;\">\n    <div style=\"max-width:1000px;margin:0 auto;\">\n      <div style=\"border-left:3px solid #F5C518;padding:6px 0 6px 26px;margin-bottom:40px;\">\n        <div style=\"font-size:30px;line-height:1.28;font-weight:300;font-style:italic;color:#FCF3D2;text-wrap:balance;\">\"The CEOs who lead AI will define the next decade. The ones who wait will be managed by it.\"<\u002Fdiv>\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#F5C518;margin-top:16px;\">— Ignite AI<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px;\">\n        <div>\n          <div style=\"font-size:16px;font-weight:300;font-style:italic;line-height:1.45;color:#E9E4D6;\">\"Pick a partner who will still take your call after the contract is signed.\"<\u002Fdiv>\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#F5C518;margin-top:10px;\">Ignite AI<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:16px;font-weight:300;font-style:italic;line-height:1.45;color:#E9E4D6;\">\"If your change speed can't keep up with technology, a smaller company will teach you the lesson.\"<\u002Fdiv>\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#948F82;margin-top:10px;\">Satya Nadella, Microsoft<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:16px;font-weight:300;font-style:italic;line-height:1.45;color:#E9E4D6;\">\"Price is what you pay. Value is what you get.\"<\u002Fdiv>\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#948F82;margin-top:10px;\">Warren Buffett<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- WORKSHOPS -->\n  <div id=\"workshops\" style=\"scroll-margin-top:66px;background:#fff;padding:86px 28px;\">\n    <div style=\"max-width:1140px;margin:0 auto;\">\n      <div style=\"max-width:660px;margin-bottom:40px;\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#B98900;margin-bottom:14px;\">Workshops<\u002Fdiv>\n        <h2 style=\"font-size:40px;line-height:1.06;font-weight:800;letter-spacing:-.02em;margin:0 0 14px;text-wrap:balance;\">One deliverable: a signed One-Page AI Plan<\u002Fh2>\n        <p style=\"font-size:16.5px;line-height:1.6;color:#5B5852;margin:0;text-wrap:pretty;\">We don't sell software and we don't have a vendor agenda. We run working sessions that end with a decision your whole team can execute on Monday.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- HOW IT WORKS -->\n      <div style=\"margin-bottom:52px;\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#B98900;margin-bottom:14px;\">How a session works<\u002Fdiv>\n        <p style=\"font-size:15.5px;line-height:1.6;color:#5B5852;margin:0 0 26px;max-width:640px;text-wrap:pretty;\">Every workshop is a working session, not a lecture. We get your real decisions on the whiteboard, resolve the trade-offs live, and leave you with a plan in writing — with owners and dates attached.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px;\">\n          <div style=\"display:flex;gap:14px;align-items:flex-start;\"><span style=\"flex-shrink:0;width:30px;height:30px;border-radius:50%;background:#141310;color:#F5C518;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;\">1<\u002Fspan><div><div style=\"font-weight:800;font-size:15px;color:#141310;\">Diagnose<\u002Fdiv><div style=\"font-size:13.5px;color:#5B5852;line-height:1.5;\">Where you really are today — honestly, across strategy, team, and tools.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:14px;align-items:flex-start;\"><span style=\"flex-shrink:0;width:30px;height:30px;border-radius:50%;background:#141310;color:#F5C518;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;\">2<\u002Fspan><div><div style=\"font-weight:800;font-size:15px;color:#141310;\">Decide<\u002Fdiv><div style=\"font-size:13.5px;color:#5B5852;line-height:1.5;\">Your AI North Star and the hard trade-offs — settled in the room, not deferred.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:14px;align-items:flex-start;\"><span style=\"flex-shrink:0;width:30px;height:30px;border-radius:50%;background:#141310;color:#F5C518;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;\">3<\u002Fspan><div><div style=\"font-weight:800;font-size:15px;color:#141310;\">Plan<\u002Fdiv><div style=\"font-size:13.5px;color:#5B5852;line-height:1.5;\">A written One-Page AI Plan and a 60-day game plan with named owners.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:stretch;\">\n        <div style=\"border:1px solid rgba(20,19,16,.12);border-radius:18px;padding:30px 28px;display:flex;flex-direction:column;\">\n          <div style=\"font-size:19px;font-weight:800;letter-spacing:-.01em;\">The Intensive<\u002Fdiv>\n          <div style=\"font-size:13.5px;color:#5B5852;margin-top:6px; 02Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#8B857A;margin:16px 0 18px;padding-top:14px;border-top:1px solid rgba(20,19,16,.1);\"><b style=\"color:#141310;\">Best for:<\u002Fb> aligning a leadership team that's pulling in different directions on AI.<\u002Fdiv>\n          <a href=\"#book\" style=\"text-align:center;background:#F5C518;color:#141310;padding:12px;border-radius:10px;font-weight:800;font-size:14px;\">Schedule<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"border:1px solid rgba(20,19,16,.12);border-radius:18px;padding:30px 28px;display:flex;flex-direction:column;\">\n          <div style=\"font-size:19px;font-weight:800;letter-spacing:-.01em;\">The Series<\u002Fdiv>\n          <div style=\"font-size:13.5px;color:#5B5852;margin-top:6px;\">3–4 sessions over 60–90 days<\u002Fdiv>\n          <sc-if value=\"{{ showPricing }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"font-size:26px;font-weight:800;color:#141310;margin:20px 0 6px;\">$35,000–$55,000<\u002Fdiv><\u002Fsc-if>\n          <p style=\"font-size:13.5px;line-height:1.55;color:#5B5852;margin:14px 0 18px;\">Plan, build the Lab, and stand up measurement — with Todd alongside you through the first execution cycle.<\u002Fp>\n          <div style=\"font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#B98900;margin-bottom:12px;\">What you leave with<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;font-size:13.5px;line-height:1.5;color:#3A3833;flex:1;\">\n            <div style=\"display:flex;gap:9px;\"><span style=\"color:#B98900;font-weight:800;\">✓<\u002Fspan>Everything in The Team Workshop<\u002Fdiv>\n            <div style=\"display:flex;gap:9px;\"><span style=\"color:#B98900;font-weight:800;\">✓<\u002Fspan>A stood-up AI Lab with a working charter<\u002Fdiv>\n            <div style=\"display:flex;gap:9px;\"><span style=\"color:#B98900;font-weight:800;\">✓<\u002Fspan>Your first pilot scoped, launched, and measured<\u002Fdiv>\n            <div style=\"display:flex;gap:9px;\"><span style=\"color:#B98900;font-weight:800;\">✓<\u002Fspan>An ROI dashboard your board can read<\u002Fdiv>\n            <div style=\"display:flex;gap:9px;\"><span style=\"color:#B98900;font-weight:800;\">✓<\u002Fspan>Todd alongside you through the first execution cycle<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#8B857A;margin:16px 0 18px;padding-top:14px;border-top:1px solid rgba(20,19,16,.08);\"><b style=\"color:#141310;\">Best for:<\u002Fb> a company ready to go from plan to real, measured execution.<\u002Fdiv>\n          <a href=\"#book\" style=\"text-align:center;background:#141310;color:#fff;padding:12px;border-radius:10px;font-weight:700;font-size:14px;\">Schedule<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- RESOURCES -->\n  <div id=\"resources\" style=\"scroll-margin-top:66px;background:#F4F1E8;padding:86px 28px;\">\n    <div style=\"max-width:1140px;margin:0 auto;\">\n      <div style=\"max-width:660px;margin-bottom:44px;\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#B98900;margin-bottom:14px;\">Get access<\u002Fdiv>\n        <h2 style=\"font-size:40px;line-height:1.06;font-weight:800;letter-spacing:-.02em;margin:0 0 14px;text-wrap:balance;\">The tools, ready to use<\u002Fh2>\n        <p style=\"font-size:16.5px;line-height:1.6;color:#5B5852;margin:0;text-wrap:pretty;\">Everything the workshops produce, straight from the book. Fill out one short form and we'll send them over.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px;\">\n        <div style=\"background:#fff;border-radius:18px;padding:30px 28px;border:1px solid rgba(20,19,16,.08);display:flex;flex-direction:column;\">\n          <div style=\"width:42px;height:42px;border-radius:11px;background:#141310;color:#F5C518;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;\">1P<\u002Fdiv>\n          <div style=\"font-size:18px;font-weight:800;margin-top:18px;\">Sample AI Plan<\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.55;color:#5B5852;margin:10px 0 22px;flex:1;\">A fully worked One-Page AI Plan and 60-Day Game Plan you can model your own on.<\u002Fp>\n          <a href=\"#book\" style=\"font-weight:700;font-size:14px;color:#B98900;\">Request access →<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border-radius:18px;padding:30px 28px;border:1px solid rgba(20,19,16,.08);display:flex;flex-direction:column;\">\n          <div style=\"width:42px;height:42px;border-radius:11px;background:#141310;color:#F5C518;display:flex;align-items:flex-end;justify-content:center;gap:3px;padding:11px 0;\">\n            <span style=\"width:5px;height:9px;background:#F5C518;border-radius:1px;\"><\u002Fspan>\n            <span style=\"width:5px;height:16px;background:#F5C518;border-radius:1px;\"><\u002Fspan>\n            <span style=\"width:5px;height:13px;background:#F5C518;border-radius:1px;\"><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:18px;font-weight:800;margin-top:18px;\">Boardroom Resources<\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.55;color:#5B5852;margin:10px 0 22px;flex:1;\">The charts and statistics on the state of AI — built to put on screen at your next board meeting.<\u002Fp>\n          <a href=\"#book\" style=\"font-weight:700;font-size:14px;color:#B98900;\">Request access →<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border-radius:18px;padding:30px 28px;border:1px solid rgba(20,19,16,.08);display:flex;flex-direction:column;\">\n          <div style=\"width:42px;height:42px;border-radius:11px;background:#141310;color:#F5C518;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;\">✎<\u002Fdiv>\n          <div style=\"font-size:18px;font-weight:800;margin-top:18px;\">Starter Templates<\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.55;color:#5B5852;margin:10px 0 22px;flex:1;\">The Lab Charter, North Star worksheet, board briefing, and the scripts for every hard AI conversation.<\u002Fp>\n          <a href=\"#book\" style=\"font-weight:700;font-size:14px;color:#B98900;\">Request access →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ABOUT -->\n  <div id=\"about\" style=\"scroll-margin-top:66px;background:#fff;padding:86px 28px;\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;gap:52px;align-items:center;flex-wrap:wrap;\">\n      <div style=\"flex:0 0 auto;\">\n        <img src=\"39862ffb-1877-4f3a-8443-6dfc7387cf4c\" alt=\"Todd McCall\" style=\"width:240px;height:240px;border-radius:20px;object-fit:cover;border:3px solid #F5C518;\">\n      <\u002Fdiv>\n      <div style=\"flex:1;min-width:300px;\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#B98900;margin-bottom:12px;\">About the author<\u002Fdiv>\n        <h2 style=\"font-size:34px;font-weight:800;letter-spacing:-.02em;margin:0 0 4px;\">Todd McCall<\u002Fh2>\n        <div style=\"font-size:15px;font-weight:600;color:#B98900;margin-bottom:20px;\">Founder, Ignite AI<\u002Fdiv>\n        <p style=\"font-size:15.5px;line-height:1.65;color:#3F3D38;margin:0 0 14px;text-wrap:pretty;\">I've been knee-deep in the Salesforce world since 2014, and somewhere along the way I got a little obsessed with how AI is changing the way we lead. I'm a lifelong learner at heart — which is a polite way of saying I can't leave a good problem alone.<\u002Fp>\n        <p style=\"font-size:15.5px;line-height:1.65;color:#3F3D38;margin:0 0 14px;text-wrap:pretty;\">I live in Franklin, Tennessee with my wife, Marianne, and our five kids, so trust me: I know a thing or two about making decisions with incomplete information and a lot of noise in the room.<\u002Fp>\n        <p style=\"font-size:15.5px;line-height:1.65;color:#3F3D38;margin:0;text-wrap:pretty;\">I started Ignite AI for one reason — to help leaders like you get out ahead of this shift instead of getting swept up by it. No jargon, no vendor agenda, just straight talk and a plan.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- BOOK / FORM -->\n  <div id=\"book\" style=\"scroll-margin-top:66px;background:#0B0A08;color:#fff;padding:86px 28px;\">\n    <div style=\"max-width:960px;margin:0 auto;display:flex;gap:56px;flex-wrap:wrap;align-items:flex-start;\">\n      <div style=\"flex:1;min-width:280px;\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#F5C518;margin-bottom:16px;\">Start the conversation<\u002Fdiv>\n        <h2 style=\"font-size:38px;line-height:1.08;font-weight:800;letter-spacing:-.02em;margin:0 0 18px;text-wrap:balance;\">Book a workshop. Leave with a plan.<\u002Fh2>\n        <p style=\"font-size:16px;line-height:1.6;font-weight:300;color:#CFC7B0;margin:0 0 26px;text-wrap:pretty;\">Tell us a little about where you are. Todd reads every one of these personally and will follow up to find the right session — or point you to the resource you need.<\u002Fp>\n        <div style=\"border-left:3px solid #F5C518;padding:4px 0 4px 20px;\">\n          <div style=\"font-size:17px;font-weight:300;font-style:italic;line-height:1.4;color:#FCF3D2;\">\"Pick a partner who will still take your call after the contract is signed.\"<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:0 0 420px;max-width:100%;\">\n        <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background:#fff;border-radius:18px;padding:28px;color:#141310;\">\n            <div style=\"display:flex;flex-direction:column;gap:14px;\">\n              <div>\n                <label style=\"font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#5B5852;display:block;margin-bottom:6px;\">Company name<\u002Flabel>\n                <input class=\"ig-fld\" oninput=\"{{ onCompany }}\" placeholder=\"Acme Corp\" style=\"width:100%;font-family:inherit;font-size:15px;padding:12px 14px;border:1px solid rgba(20,19,16,.18);border-radius:10px;outline:none;color:#141310;\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#5B5852;display:block;margin-bottom:6px;\">Email address<\u002Flabel>\n                <input class=\"ig-fld\" type=\"email\" oninput=\"{{ onEmail }}\" placeholder=\"you@company.com\" style=\"width:100%;font-family:inherit;font-size:15px;padding:12px 14px;border:1px solid rgba(20,19,16,.18);border-radius:10px;outline:none;color:#141310;\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#5B5852;display:block;margin-bottom:6px;\">Phone number<\u002Flabel>\n                <input class=\"ig-fld\" type=\"tel\" oninput=\"{{ onPhone }}\" placeholder=\"(615) 555-0142\" style=\"width:100%;font-family:inherit;font-size:15px;padding:12px 14px;border:1px solid rgba(20,19,16,.18);border-radius:10px;outline:none;color:#141310;\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#5B5852;display:block;margin-bottom:6px;\">Current AI goals<\u002Flabel>\n                <textarea class=\"ig-fld\" rows=\"3\" oninput=\"{{ onGoals }}\" placeholder=\"What are you trying to figure out or accomplish with AI?\" style=\"width:100%;font-family:inherit;font-size:15px;padding:12px 14px;border:1px solid rgba(20,19,16,.18);border-radius:10px;outline:none;resize:vertical;color:#141310;\"><\u002Ftextarea>\n              <\u002Fdiv>\n              <sc-if value=\"{{ hasError }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-size:13px;color:#B4322A;font-weight:600;\">{{ err }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <button onclick=\"{{ onSubmit }}\" style=\"cursor:pointer;font-family:inherit;font-size:15px;font-weight:800;color:#141310;background:#F5C518;border:none;padding:15px;border-radius:11px;margin-top:4px;\" style-hover=\"background:#ffd21f;\">Request my session →<\u002Fbutton>\n              <div style=\"font-size:11.5px;color:#8C8B84;text-align:center;\">No spam. Todd replies personally, usually within a day.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fff;border-radius:18px;padding:40px 30px;color:#141310;text-align:center;\">\n            <div style=\"width:56px;height:56px;border-radius:50%;background:#F5C518;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;margin:0 auto 18px;\">✓<\u002Fdiv>\n            <div style=\"font-size:22px;font-weight:800;letter-spacing:-.01em;margin-bottom:10px;\">You're on Todd's desk.<\u002Fdiv>\n            <p style=\"font-size:14.5px;line-height:1.6;color:#5B5852;margin:0 0 8px;\">Thanks{{ submittedName }} — we've got your details and Todd will be in touch personally to find the right next step.<\u002Fp>\n            <p style=\"font-size:13px;color:#8C8B84;margin:0;\">In the meantime, keep asking the assistant anything.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FOOTER -->\n  <div style=\"background:#000;color:#9C968A;padding:40px 28px;\">\n    <div style=\"max-width:1140px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;\">\n      <div style=\"display:flex;align-items:center;gap:10px;\">\n        <span style=\"width:24px;height:24px;background:#F5C518;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#141310;\">AI<\u002Fspan>\n        <span style=\"font-size:13px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#fff;\">Ignite AI<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px;\">© 2026 Ignite AI · <a href=\"#book\" style=\"color:#F5C518;\">todd@igniteai.biz<\u002Fa> · igniteai.biz<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:900},&quot;amazonUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://www.amazon.com&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;General&quot;},&quot;assistantModel&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;claude-haiku-4-5&quot;,&quot;claude-sonnet-4-5&quot;],&quot;default&quot;:&quot;claude-haiku-4-5&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Assistant&quot;},&quot;showWorkshopPricing&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Workshops&quot;},&quot;bookingUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;General&quot;}}\">\nclass Component extends DCLogic {\n  state = { messages: [], loading: false, draft: '', submitted: false, err: '', submittedName: '' };\n\n  form = { company: '', email: '', phone: '', goals: '' };\n\n  starters = [\n    \"What AI trends should I know about right now?\",\n    \"Explain AI agents, RAG, and fine-tuning in plain English.\",\n    \"How do I choose the right AI tools for my team?\",\n    \"What should our company's AI North Star look like?\",\n    \"How do I answer my board's hardest questions about AI?\",\n    \"What's a good first AI project with real ROI?\"\n  ];\n\n  componentDidUpdate() {\n    if (this.msgEl) this.msgEl.scrollTop = this.msgEl.scrollHeight;\n  }\n\n  parse(raw) {\n    let t = (raw || '').trim().replace(/^```(json)?/i, '').replace(/```$/, '').trim();\n    try {\n      const o = JSON.parse(t);\n      return { answer: o.answer || t, followups: Array.isArray(o.followups) ? o.followups.slice(0, 3) : [] };\n    } catch (e) {\n      const m = t.match(/\\{[\\s\\S]*\\}/);\n      if (m) { try { const o = JSON.parse(m[0]); return { answer: o.answer || t, followups: Array.isArray(o.followups) ? o.followups.slice(0, 3) : [] }; } catch (_) {} }\n      return { answer: t, followups: [] };\n    }\n  }\n\n  async ask(q) {\n    q = (q || '').trim();\n    if (!q || this.state.loading) return;\n    this.setState({ messages: [...this.state.messages, { role: 'user', text: q }], loading: true, draft: '' });\n    const kb = window.IGNITE_KB || '';\n    const system = \"You are the Ignite AI Assistant on igniteai.biz — a knowledgeable, action-oriented advisor on ALL things AI. You help business leaders and anyone curious understand and act on AI. Rules:\\n\"\n      + \"- Answer ANY question about AI: strategy, real tools and products, the underlying technology, prompting, key terms and concepts, current trends, vendor selection, implementation, risks and governance, careers, and how AI applies to a specific industry or role. Draw on your full, current knowledge of the field — be specific, name real approaches and tradeoffs, and explain jargon in plain language.\\n\"\n      + \"- Accuracy first: never invent statistics, product capabilities, company names, or figures you aren't confident about. If something is uncertain or moving fast, say so plainly.\\n\"\n      + \"- THE AI POCKET GUIDE by Todd McCall (below) is Todd's point of view and your house perspective. When a question touches leadership, strategy, the board, ROI, culture, team adoption, or vendor selection, lead with its frameworks, language, and stats and stay true to them. For broader or technical questions the book is a lens, not a limit — go well beyond it to be genuinely useful.\\n\"\n      + \"- Be practical and decisive: prefer concrete next steps, examples, and clear explanations over vague background.\\n\"\n      + \"- Warm, direct, confident tone. Aim for under 200 words. Use short paragraphs; when listing, use lines starting with '• '.\\n\"\n      + \"- Only when it genuinely fits, point the reader to a relevant Ignite AI resource (a workshop with Todd, the sample AI plan, or the book). Never force it onto every answer.\\n\"\n      + \"Respond with MINIFIED JSON ONLY (no code fences, no prose around it): {\\\"answer\\\": string, \\\"followups\\\": [three short, natural next questions the user would likely ask]}.\\n\\n\"\n      + \"REFERENCE — Todd McCall's point of view (The AI Pocket Guide):\\n\" + kb;\n    try {\n      const res = await fetch('/api/ask', {\n        method: 'POST',\n        headers: { 'Content-Type': 'application/json' },\n        body: JSON.stringify({ system, question: q, model: this.props.assistantModel || 'claude-haiku-4-5' })\n      });\n      if (!res.ok) throw new Error('bad response');\n      const data = await res.json();\n      const raw = data.text || '';\n      const o = this.parse(raw);\n      this.setState({ messages: [...this.state.messages, { role: 'assistant', text: o.answer, followups: o.followups }], loading: false });\n    } catch (e) {\n      this.setState({ messages: [...this.state.messages, { role: 'assistant', text: \"I hit a snag reaching the guide just now — give it another try, or book a workshop and ask Todd directly.\", followups: [] }], loading: false });\n    }\n  }\n\n  onSend() { this.ask(this.state.draft); }\n\n  restart() { this.setState({ messages: [], loading: false, draft: '' }); }\n\n  submit() {\n    const f = this.form;\n    if (!f.company.trim() || !f.email.trim()) { this.setState({ err: 'Please add at least your company name and email.' }); return; }\n    if (!/.+@.+\\..+/.test(f.email.trim())) { this.setState({ err: 'That email doesn\\u2019t look quite right.' }); return; }\n    try { localStorage.setItem('ignite_lead', JSON.stringify({ ...f, at: Date.now() })); } catch (e) {}\n    try {\n      fetch('/api/lead', {\n        method: 'POST',\n        headers: { 'Content-Type': 'application/json' },\n        body: JSON.stringify({ company: f.company.trim(), email: f.email.trim(), phone: f.phone.trim(), goals: f.goals.trim() })\n      });\n    } catch (e) {}\n    const first = f.company.trim() ? ', ' + f.company.trim() : '';\n    this.setState({ submitted: true, err: '', submittedName: first });\n  }\n\n  renderVals() {\n    const chip = (label) => ({ label, onClick: () => this.ask(label) });\n    const msgs = this.state.messages.map(m => ({\n      isUser: m.role === 'user',\n      isBot: m.role !== 'user',\n      text: m.text,\n      hasFollowups: m.role !== 'user' && Array.isArray(m.followups) && m.followups.length > 0,\n      followups: (m.followups || []).map(chip)\n    }));\n    const hasMessages = this.state.messages.length > 0 || this.state.loading;\n    return {\n      starters: this.starters.map(chip),\n      msgs,\n      hasMessages,\n      isEmpty: !hasMessages,\n      loading: this.state.loading,\n      draft: this.state.draft,\n      onDraft: (e) => this.setState({ draft: e.target.value }),\n      onKey: (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.onSend(); } },\n      onSend: () => this.onSend(),\n      onRestart: () => this.restart(),\n      amazonUrl: this.props.amazonUrl || 'https://www.amazon.com',\n      setMsgRef: (el) => { this.msgEl = el; },\n      showPricing: this.props.showWorkshopPricing !== false,\n      onCompany: (e) => { this.form.company = e.target.value; },\n      onEmail: (e) => { this.form.email = e.target.value; },\n      onPhone: (e) => { this.form.phone = e.target.value; },\n      onGoals: (e) => { this.form.goals = e.target.value; },\n      onSubmit: () => this.submit(),\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      hasError: !!this.state.err,\n      err: this.state.err,\n      submittedName: this.state.submittedName\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
